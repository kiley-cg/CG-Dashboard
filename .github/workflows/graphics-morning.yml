name: Graphics Queue — Morning Snapshot & Email

on:
  schedule:
    # 7:30 AM PST (UTC-8) = 15:30 UTC  |  7:30 AM PDT (UTC-7) = 14:30 UTC
    # Using 15:30 UTC (winter/PST). During summer (PDT) this fires at 8:30 AM PT.
    # To switch to PDT (summer), change to: '30 14 * * 1-5'
    - cron: '30 15 * * 1-5'   # weekdays only (Mon–Fri)
  workflow_dispatch:            # allow manual trigger from GitHub Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run morning script
        env:
          SYNCORE_API_KEY: ${{ secrets.SYNCORE_API_KEY }}
          SYNCORE_GRAPHICS_DEPT_ID: ${{ secrets.SYNCORE_GRAPHICS_DEPT_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: npx ts-node --project tsconfig.scripts.json -r tsconfig-paths/register src/scripts/graphics-morning.ts
