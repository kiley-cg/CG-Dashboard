# Cloud Build config — auto-deploy to Cloud Run on push to main.
#
# Setup (one-time):
#   1. Connect your repo in Cloud Build console:
#      https://console.cloud.google.com/cloud-build/triggers
#   2. Create a trigger: branch = ^main$, config = cloudbuild.yaml
#   3. Set substitution variables in the trigger (or Cloud Run env vars):
#      _REGION, _SERVICE_NAME (optional — defaults below are fine)
#   4. Grant Cloud Build service account the "Cloud Run Admin" and
#      "Service Account User" roles in IAM.

substitutions:
  _SERVICE_NAME: cg-dashboard
  _REGION: us-central1

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--quiet'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'

options:
  logging: CLOUD_LOGGING_ONLY
