<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CG Pricing Agent</title>
  <link rel="stylesheet" href="overlay-styles.css" />
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="drag-handle" title="Drag to move">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
          <circle cx="4" cy="4" r="1.2"/><circle cx="10" cy="4" r="1.2"/>
          <circle cx="4" cy="7" r="1.2"/><circle cx="10" cy="7" r="1.2"/>
          <circle cx="4" cy="10" r="1.2"/><circle cx="10" cy="10" r="1.2"/>
        </svg>
      </div>
      <span id="title">CG Pricing Agent</span>
      <span id="order-badge"></span>
      <div id="header-actions">
        <button id="btn-minimize" title="Minimize">—</button>
        <button id="btn-close" title="Close">✕</button>
      </div>
    </div>

    <div id="body">
      <!-- Idle state -->
      <div id="state-idle">
        <div class="order-info">
          <span class="label">Order detected:</span>
          <strong id="order-display">—</strong>
        </div>
        <button id="btn-run" class="btn-primary" disabled>Run Pricing Agent</button>
        <div id="config-warning" class="warning hidden">
          API key not set. <a href="#" id="open-options">Open Settings</a>
        </div>
      </div>

      <!-- Thinking state -->
      <div id="state-thinking" class="hidden">
        <div id="thinking-header">
          <div class="spinner"></div>
          <span id="thinking-status">Analyzing order…</span>
        </div>
        <div id="thinking-log"></div>
      </div>

      <!-- Proposal state -->
      <div id="state-proposal" class="hidden">
        <div id="proposal-table-wrap">
          <table id="proposal-table">
            <thead>
              <tr>
                <th>Description</th>
                <th class="num">Qty</th>
                <th class="num">Current</th>
                <th class="num highlight">Proposed</th>
              </tr>
            </thead>
            <tbody id="proposal-tbody"></tbody>
          </table>
        </div>
        <div id="proposal-actions">
          <button id="btn-approve" class="btn-primary">Approve All &amp; Apply</button>
          <button id="btn-reject" class="btn-secondary">Reject</button>
          <button id="btn-open-full" class="btn-ghost">Open Full UI ↗</button>
        </div>
      </div>

      <!-- Applying state -->
      <div id="state-applying" class="hidden">
        <div id="thinking-header">
          <div class="spinner"></div>
          <span>Writing prices to Syncore…</span>
        </div>
        <div id="apply-log"></div>
      </div>

      <!-- Done state -->
      <div id="state-done" class="hidden">
        <div class="done-icon">✓</div>
        <div class="done-msg">Prices applied successfully</div>
        <button id="btn-reset" class="btn-secondary">Price Another Order</button>
      </div>

      <!-- Error state -->
      <div id="state-error" class="hidden">
        <div class="error-icon">✕</div>
        <div id="error-msg" class="error-msg"></div>
        <button id="btn-retry" class="btn-secondary">Retry</button>
      </div>
    </div>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
