<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CG Pricing Agent</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #0f1117; color: #e2e8f0; width: 220px; padding: 16px; }
    h2 { font-size: 14px; margin-bottom: 12px; color: #fff; }
    #order-info { color: #a0aec0; font-size: 12px; margin-bottom: 14px; min-height: 16px; }
    #order-num { color: #818cf8; font-weight: 600; }
    button { width: 100%; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    #btn-open-panel { background: #4f46e5; color: #fff; }
    #btn-open-panel:hover { background: #4338ca; }
    #btn-settings { background: #2d3148; color: #a0aec0; }
    #btn-settings:hover { background: #374151; }
  </style>
</head>
<body>
  <h2>CG Pricing Agent</h2>
  <div id="order-info">No Syncore order detected.</div>
  <button id="btn-open-panel">Open Side Panel</button>
  <button id="btn-settings">⚙ Settings</button>
  <script src="popup.js"></script>
</body>
</html>
