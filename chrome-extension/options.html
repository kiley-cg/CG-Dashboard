<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CG Pricing Agent — Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #0f1117; color: #e2e8f0; padding: 32px; max-width: 480px; }
    h1 { font-size: 18px; margin-bottom: 24px; color: #fff; }
    label { display: block; color: #a0aec0; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 9px 12px; background: #1a1d27; border: 1px solid #2d3148; border-radius: 6px;
      color: #e2e8f0; font-size: 14px; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #4f46e5; }
    .field { margin-bottom: 20px; }
    .hint { font-size: 11px; color: #4a5568; margin-top: 5px; }
    button { background: #4f46e5; color: #fff; border: none; padding: 9px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
    button:hover { background: #4338ca; }
    #status { margin-top: 14px; font-size: 13px; color: #68d391; min-height: 18px; }
  </style>
</head>
<body>
  <h1>CG Pricing Agent — Settings</h1>

  <div class="field">
    <label for="dashboardUrl">Dashboard URL</label>
    <input type="text" id="dashboardUrl" placeholder="https://pricing-agent--my-project.us-central1.hosted.app" />
    <p class="hint">Your Firebase App Hosting URL (or custom domain). Use <code>http://localhost:3000</code> for local dev.</p>
  </div>

  <div class="field">
    <label for="apiKey">Extension API Key</label>
    <input type="password" id="apiKey" placeholder="Paste your EXTENSION_API_KEY value" />
    <p class="hint">Set <code>EXTENSION_API_KEY</code> in your .env.local, then paste it here. This lets the extension authenticate without a browser session.</p>
  </div>

  <button id="btn-save">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
